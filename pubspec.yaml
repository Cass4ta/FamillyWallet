name: famillywallet
description: "FamilyWallet  Gestion financiera familiar compartida"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.4.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.2.0
  google_sign_in: ^6.2.1

  # Estado
  flutter_riverpod: ^2.5.1

  # Navegacion
  go_router: ^14.2.0

  # Graficos
  fl_chart: ^0.68.0

  # Fuentes
  google_fonts: ^6.2.1

  # IA (Gemini  gratuita)
  google_generative_ai: ^0.4.6

  # Utilidades
  intl: ^0.19.0
  uuid: ^4.4.2
  flutter_animate: ^4.5.0
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
